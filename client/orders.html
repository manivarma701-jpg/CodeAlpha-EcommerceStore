<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>My Orders — CodeAlpha Store</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<header class="site-header">
  <div class="container">
    <a href="index.html" class="brand">Code<span>Alpha</span> Store</a>
    <div class="nav-actions" style="margin-left:auto;">
      <div data-auth-area></div>
      <a href="cart.html" class="nav-link cart-link">
        🛒 Cart
        <span class="cart-badge" data-cart-count>0</span>
      </a>
    </div>
  </div>
</header>

<main class="container" style="padding-bottom:60px;">
  <h1 style="margin:26px 0 18px;">My Orders</h1>
  <div id="orders-root">
    <div class="skeleton" style="height:120px;margin-bottom:14px;"></div>
    <div class="skeleton" style="height:120px;"></div>
  </div>
</main>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/nav.js"></script>
<script>
  async function loadOrders() {
    const root = document.getElementById('orders-root');

    if (!Auth.isLoggedIn()) {
      window.location.href = 'login.html?next=orders.html';
      return;
    }

    try {
      const orders = await apiRequest('/orders', { auth: true });

      if (orders.length === 0) {
        root.innerHTML = `
          <div class="panel">
            <div class="empty-state">
              <div class="icon">📦</div>
              <p>You haven't placed any orders yet.</p>
              <a href="index.html" class="btn btn-primary" style="margin-top:14px;">Start shopping</a>
            </div>
          </div>
        `;
        return;
      }

      root.innerHTML = orders
        .map(
          (order) => `
        <div class="order-card">
          <div class="order-card-head">
            <div>
              <strong>Order #${order._id.slice(-8).toUpperCase()}</strong>
              <div style="color:var(--slate);font-size:0.82rem;">${new Date(order.createdAt).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' })}</div>
            </div>
            <span class="status-pill ${order.status}">${order.status}</span>
          </div>
          ${order.items
            .map(
              (i) => `<div class="mini-line"><img src="${i.image}" alt="${i.name}" /><div><div>${i.name}</div><div class="unit-price">Qty ${i.quantity} × ₹${i.price.toLocaleString('en-IN')}</div></div></div>`
            )
            .join('')}
          <div class="summary-row total" style="margin-top:10px;"><span>Total</span><span>₹${order.totalAmount.toLocaleString('en-IN')}</span></div>
        </div>
      `
        )
        .join('');
    } catch (err) {
      root.innerHTML = `<div class="panel"><p>${err.message}</p></div>`;
    }
  }
  document.addEventListener('DOMContentLoaded', loadOrders);
</script>
</body>
</html>
