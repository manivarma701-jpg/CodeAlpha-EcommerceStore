<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Create Account — CodeAlpha Store</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<header class="site-header">
  <div class="container">
    <a href="index.html" class="brand">Code<span>Alpha</span> Store</a>
    <div class="nav-actions" style="margin-left:auto;">
      <a href="index.html" class="nav-link">← Back to shop</a>
    </div>
  </div>
</header>

<div class="auth-shell">
  <div class="auth-card">
    <h1>Create your account</h1>
    <p class="sub">Sign up to save orders and check out faster.</p>

    <div class="form-error" data-error></div>

    <form id="register-form">
      <div class="field">
        <label for="name">Full name</label>
        <input type="text" id="name" required />
      </div>
      <div class="field">
        <label for="email">Email address</label>
        <input type="email" id="email" required />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" required minlength="6" />
        <small style="color:var(--slate);font-size:0.78rem;">At least 6 characters</small>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Create Account</button>
    </form>

    <p class="auth-switch">Already have an account? <a href="login.html">Log in</a></p>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
