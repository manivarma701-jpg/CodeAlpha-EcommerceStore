<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Product Details — CodeAlpha Store</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

<header class="site-header">
  <div class="container">
    <a href="index.html" class="brand">Code<span>Alpha</span> Store</a>
    <form class="search-form" data-search-form>
      <input type="text" placeholder="Search for products, brands and more" />
      <button type="submit">Search</button>
    </form>
    <div class="nav-actions">
      <div data-auth-area></div>
      <a href="cart.html" class="nav-link cart-link">
        🛒 Cart
        <span class="cart-badge" data-cart-count>0</span>
      </a>
    </div>
  </div>
</header>

<main class="container" id="pd-root">
  <div class="pd-grid">
    <div class="skeleton" style="aspect-ratio:1/1;"></div>
    <div>
      <div class="skeleton" style="height:24px;width:40%;margin-bottom:14px;"></div>
      <div class="skeleton" style="height:40px;width:80%;margin-bottom:14px;"></div>
      <div class="skeleton" style="height:100px;"></div>
    </div>
  </div>
</main>

<footer class="site-footer">
  <p><strong>CodeAlpha_Ecommerce</strong> — Task 1 demo project. Product photos are free-to-use placeholder images, not affiliated with any retailer.</p>
</footer>

<div class="toast" data-toast></div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/nav.js"></script>
<script src="js/home.js"></script>
<script src="js/product.js"></script>
</body>
</html>
